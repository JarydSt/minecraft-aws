---
- name: Configure Minecraft Docker server
  hosts: minecraft
  become: true
  gather_facts: true

  vars:
    minecraft_dir: /opt/minecraft
    swap_file: /swapfile
    swap_size_mb: 2048

  tasks:
    - name: Update installed packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - docker
          - nmap-ncat
        state: present

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Check whether swap file exists
      ansible.builtin.stat:
        path: "{{ swap_file }}"
      register: swap_status

    - name: Create swap file for small EC2 instance
      ansible.builtin.command: "fallocate -l {{ swap_size_mb }}M {{ swap_file }}"
      when: not swap_status.stat.exists
      changed_when: true

    - name: Set swap file permissions
      ansible.builtin.file:
        path: "{{ swap_file }}"
        owner: root
        group: root
        mode: "0600"

    - name: Format swap file
      ansible.builtin.command: "mkswap {{ swap_file }}"
      when: not swap_status.stat.exists
      changed_when: true

    - name: Enable swap immediately
      ansible.builtin.command: "swapon {{ swap_file }}"
      when: not swap_status.stat.exists
      changed_when: true

    - name: Persist swap in fstab
      ansible.builtin.mount:
        name: none
        src: "{{ swap_file }}"
        fstype: swap
        opts: sw
        passno: "0"
        dump: "0"
        state: present

    - name: Create Minecraft data directory
      ansible.builtin.file:
        path: "{{ minecraft_dir }}/data"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Pull Minecraft Docker image
      ansible.builtin.command: docker pull itzg/minecraft-server:latest
      changed_when: false

    - name: Install Minecraft systemd service
      ansible.builtin.template:
        src: minecraft.service.j2
        dest: /etc/systemd/system/minecraft.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart minecraft

    - name: Enable and start Minecraft service
      ansible.builtin.systemd:
        name: minecraft
        enabled: true
        state: started
        daemon_reload: true

    - name: Show Minecraft service status
      ansible.builtin.command: systemctl is-active minecraft
      register: minecraft_status
      changed_when: false

    - name: Print Minecraft status
      ansible.builtin.debug:
        msg: "Minecraft service is {{ minecraft_status.stdout }}"

  handlers:
    - name: Restart minecraft
      ansible.builtin.systemd:
        name: minecraft
        state: restarted
        daemon_reload: true
